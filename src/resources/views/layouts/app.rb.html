<!-- 
  📑 LABEL: LAYOUT UTAMA (app.rb.html)
  Hanya menggunakan HTMX untuk interaksi.
-->
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RustBasic{% endblock %}</title>
    
    <!-- 1. Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5.3.8 CSS -->
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    
    <!-- 2. File CSS Utama (Injected Local) -->
    <style>{{ app_css() | safe }}</style>
    
    <!-- 3. Library Frontend (HTMX Local Macro) -->
    <script>{{ htmx_js() | safe }}</script>
    <!-- Bootstrap 5.3.8 JS -->
    <script src="/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light" hx-boost="true" hx-headers='{"X-CSRF-TOKEN": "{{ csrf_token }}"}'>
    <div id="indicator" class="htmx-indicator">Loading...</div>
    
    <main>
        <!-- Flash Messages (Floating & Auto-dismiss via CSS) -->
        {% if flash_success or flash_error %}
        <style>
            @keyframes toastIn {
                0% { opacity: 0; transform: translateX(80px); }
                100% { opacity: 1; transform: translateX(0); }
            }
            @keyframes toastOut {
                0% { opacity: 1; max-height: 80px; padding: 1rem 1.5rem; margin-bottom: 10px; }
                60% { opacity: 0; max-height: 80px; padding: 1rem 1.5rem; margin-bottom: 10px; }
                100% { opacity: 0; max-height: 0; padding: 0 1.5rem; margin-bottom: 0; overflow: hidden; }
            }
            .toast-container {
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 9999;
                pointer-events: none;
            }
            .toast {
                min-width: 300px;
                padding: 1rem 1.5rem;
                border-radius: 8px;
                box-shadow: 0 10px 25px rgba(0,0,0,0.15);
                color: white;
                font-weight: 500;
                margin-bottom: 10px;
                overflow: hidden;
                animation: toastIn 0.4s ease-out, toastOut 0.6s ease-in 3.4s forwards;
            }
            .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
            .toast.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        </style>
        <div class="toast-container">
            {% if flash_success %}
                <div class="toast success">✓ {{ flash_success }}</div>
            {% endif %}
            {% if flash_error %}
                <div class="toast error">✕ {{ flash_error }}</div>
            {% endif %}
        </div>
        {% endif %}

        <!-- Konten dari file lain akan muncul di sini -->
        {% block content %}{% endblock %}
    </main>
</body>
</html>
