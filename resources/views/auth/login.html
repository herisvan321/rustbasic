{% extends "layouts/app.html" %}

{% block title %}Login - RustBasic{% endblock %}

{% block content %}
<div class="flex-center">
    <div class="glass-panel" style="max-width: 450px;">
        <h1 class="title" style="font-size: 2.5rem; text-align: center;">Login</h1>
        <p class="subtitle" style="text-align: center;">Masuk ke akun Anda</p>

        <form hx-post="/login" hx-target="body" hx-push-url="true">
            <div class="mb-4">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" placeholder="nama@email.com" value="{{ old.email }}" required>
                {% if errors.email %}<small class="text-danger">{{ errors.email[0] }}</small>{% endif %}
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="********" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-4">MASUK</button>

            <p class="text-muted" style="text-align: center; font-size: 0.9rem;">
                Belum punya akun? <a href="/register" class="text-primary" style="font-weight: 700;">Daftar Sekarang</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
