<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Error - {{ code }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/style.css?v=1.1">
    <style>
        .debug-message {
            background: #1e293b;
            color: #38bdf8;
            padding: 1.5rem;
            border-radius: 1rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            border-left: 5px solid #f43f5e;
            overflow-x: auto;
        }
    </style>
</head>
<body style="background: #0f172a;">
    <div class="split-screen">
        <!-- Sisi Visual (Error Info) -->
        <div class="split-side-visual" style="flex: 0.6; background: #1e293b; text-align: left; align-items: flex-start; padding: 4rem;">
            <div style="color: #f43f5e; font-weight: 800; letter-spacing: 0.2em; margin-bottom: 1rem;">DEBUG MODE</div>
            <h1 style="font-size: 3.5rem; font-weight: 800; margin-bottom: 2rem;">Error {{ code }}</h1>
            
            <div style="width: 100%; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 2rem;">
                <div style="margin-bottom: 1.5rem;">
                    <div style="color: #64748b; font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">Template</div>
                    <div style="color: #94a3b8;">{{ template_name }}</div>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <div style="color: #64748b; font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">Environment</div>
                    <div style="color: #94a3b8;">{{ env }}</div>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <div style="color: #64748b; font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">Time</div>
                    <div style="color: #94a3b8;">{{ now }}</div>
                </div>
            </div>
        </div>

        <!-- Sisi Konten (Stack Trace / Detail) -->
        <div class="split-side-content" style="flex: 1; background: #0f172a; align-items: flex-start; padding: 4rem;">
            <div style="width: 100%;">
                <h2 style="color: #fff; font-size: 2rem; font-weight: 800; margin-bottom: 1.5rem;">{{ title }}</h2>
                <div class="debug-message">
                    {{ error_detail }}
                </div>
                
                <div style="margin-top: 3rem;">
                    <a href="/" class="btn btn-primary">Kembali ke Beranda</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
