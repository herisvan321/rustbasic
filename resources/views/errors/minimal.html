<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ code }} | {{ title }}</title>
    <link rel="stylesheet" href="/public/css/style.css?v=1.1">
</head>
<body>
    <div class="split-screen">
        <!-- Sisi Visual (Error) -->
        <div class="split-side-visual" style="background: #1a1a2e;">
            <div style="font-size: 15rem; font-weight: 800; opacity: 0.2; line-height: 1; margin-bottom: -2rem;">
                {{ code }}
            </div>
            <h1 style="font-size: 4rem; font-weight: 800; color: var(--primary);">{{ code }}</h1>
        </div>

        <!-- Sisi Konten -->
        <div class="split-side-content">
            <div class="content-container text-center">
                <h2 class="title" style="font-size: 2.5rem; margin-bottom: 1.5rem; text-align: center;">{{ title }}</h2>
                <p class="text-muted mb-5" style="font-size: 1.1rem;">
                    {{ message }}
                </p>
                <a href="/" class="btn btn-primary w-100">KEMBALI KE BERANDA</a>
            </div>
        </div>
    </div>
</body>
</html>
