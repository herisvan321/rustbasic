[package]
name = "rustbasic"
version = "0.0.6"
edition = "2024"
description = "The official starter template and CLI tool for the RustBasic Framework."
license = "MIT"
repository = "https://github.com/herisvan321/rustbasic"
keywords = ["web", "framework", "starter", "axum", "orm"]
categories = ["web-programming::http-server", "development-tools::scaffolding"]
default-run = "rustbasic"

[[bin]]
name = "rustbasic"
path = "src/main.rs"

[[bin]]
name = "rustbasic-cli"
path = "src/cli.rs"

[dependencies]
# Core Framework (Local Path)
rustbasic-core = "0.0.6"

# Diperlukan untuk Procedural Macros (Derive) & Inti App
axum = "0.8.9"
tokio = { version = "1.52.1", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
sea-orm = { version = "1.1.4", features = ["macros", "with-chrono"] }
sea-orm-migration = "1.1.4"
validator = { version = "0.20.0", features = ["derive"] }
async-trait = "0.1.86"
rand = "0.10.1"

# Profile Optimizations
[profile.dev]
opt-level = 0
debug = true
split-debuginfo = "unpacked"

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
