[package]
name = "rustbasic"
version = "0.1.9"
edition = "2024"
description = "The official starter template and CLI tool for the RustBasic Framework."
license = "MIT"
repository = "https://github.com/herisvan321/rustbasic"
keywords = ["web", "framework", "starter", "axum", "orm"]
categories = ["web-programming::http-server", "development-tools::scaffolding"]
default-run = "rustbasic"

[[bin]]
name = "rustbasic"
path = "src/main.rs"

[dependencies]
# Core Framework (Local Path)
rustbasic-core = "0.1"

rustbasic-breeze = { version = "0.0", optional = true }

[features]
breeze = ["dep:rustbasic-breeze"]

# Profile Optimizations
[profile.dev]
opt-level = 0
debug = true
split-debuginfo = "unpacked"

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

