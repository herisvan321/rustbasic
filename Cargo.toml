[package]
name = "rustmyadmin"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.9"
minijinja = { version = "2.19.0", features = ["loader"] }
serde = { version = "1.0.228", features = ["derive"] }
tokio = { version = "1.52.1", features = ["full"] }
tower-http = { version = "0.6.8", features = ["fs"] }
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
