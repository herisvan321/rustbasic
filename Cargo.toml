# ---------------------------------------------------------
# 📑 LABEL: KONFIGURASI PROYEK (Cargo.toml)
# File ini berisi daftar "bahan baku" atau library yang digunakan.
# ---------------------------------------------------------

[package]
name = "rustbasic"
version = "0.1.0"
edition = "2024"

[dependencies]
# 1. Framework Web & Server
axum = "0.8.9"
tokio = { version = "1.52.1", features = ["full"] }

# 2. Tampilan (Template HTML)
minijinja = { version = "2.19.0", features = ["loader"] }

# 3. Pengolah Data & File Statis
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.140"
tower-http = { version = "0.6.8", features = ["fs", "set-header", "set-status"] }
chrono = "0.4.39"
base64 = "0.22.1"
rand = "0.8.5"
sha2 = "0.10.8"

# 4. Pencatatan Aktivitas (Logging) & Lingkungan (.env)
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
dotenvy = "0.15.7"
async-trait = "0.1.86"
# 5. Database (Sea-ORM & SQLx)
sea-orm = { version = "1.1.0", features = ["runtime-tokio-rustls", "sqlx-sqlite", "sqlx-mysql", "macros"] }
sqlx = { version = "0.8.2", features = ["runtime-tokio", "tls-rustls", "sqlite", "mysql"] }

# 6. Session Management
axum_session = { version = "0.19.0", features = ["key-store"] }
